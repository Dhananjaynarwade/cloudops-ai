<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0b1120;
            color:white;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:#111827;
            padding-top:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#1e293b;
            border-radius:8px;
        }

        .content{
            margin-left:260px;
            padding:20px;
        }

        .navbar-custom{
            background:#0f172a;
            border-bottom:1px solid #334155;
        }

        .card{
            background:#1e293b;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3 class="text-center">CloudOps AI</h3>
        <hr>

        <a href="/">🏠 Dashboard</a>
        <a href="/servers/">🖥 Servers</a>
        <a href="/aws/">☁ AWS</a>
        <a href="/docker/">🐳 Docker</a>
        <a href="/jenkins/">⚙ Jenkins</a>
        <a href="/kubernetes/">☸ Kubernetes</a>
        <a href="/monitoring/">📊 Monitoring</a>
        <a href="/ai-assistant/">🤖 AI Assistant</a>
        <a href="/about/">👤 About</a>
        <a href="/contact/">📞 Contact</a>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <span class="navbar-brand ms-auto">
                Intelligent Cloud & DevOps Automation Platform
            </span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
